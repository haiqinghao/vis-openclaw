<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- 像素风任务怪物精灵 -->
  <!-- 头部 -->
  <rect x="2" y="2" width="12" height="5" fill="#ff0066"/>
  <rect x="3" y="3" width="3" height="3" fill="#ff3388"/>
  <rect x="10" y="3" width="3" height="3" fill="#ff3388"/>

  <!-- 眼睛 -->
  <rect x="4" y="4" width="2" height="2" fill="#ffffff"/>
  <rect x="10" y="4" width="2" height="2" fill="#ffffff"/>

  <!-- 身体 -->
  <rect x="3" y="7" width="10" height="5" fill="#cc0055"/>

  <!-- 底部 -->
  <rect x="4" y="12" width="3" height="3" fill="#990044"/>
  <rect x="9" y="12" width="3" height="3" fill="#990044"/>

  <!-- 文档图标（代表任务） -->
  <rect x="6" y="8" width="4" height="3" fill="#ffffff"/>
  <rect x="7" y="9" width="2" height="1" fill="#cc0055"/>
</svg>